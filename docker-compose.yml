version: '3.9'

services:

  nginx:
    image: nginx:latest
    container_name: nginx_lb

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/static

    depends_on:
      - django1
      - django2

  django1:
    image: django-nginx-app
    container_name: django_app_1

    environment:
      - DEBUG=False
      - SECRET_KEY=super-secret-key
      - DB_NAME=django_db
      - DB_USER=django_user
      - DB_PASSWORD=django_pass
      - DB_HOST=db
      - DB_PORT=5432

    depends_on:
      - db

  django2:
    image: django-nginx-app
    container_name: django_app_2

    environment:
      - DEBUG=False
      - SECRET_KEY=super-secret-key
      - DB_NAME=django_db
      - DB_USER=django_user
      - DB_PASSWORD=django_pass
      - DB_HOST=db
      - DB_PORT=5432

    depends_on:
      - db

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: django_db
      POSTGRES_USER: django_user
      POSTGRES_PASSWORD: django_pass

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  static_volume: